apiVersion: apps/v1
kind: Deployment
metadata:
  name: truecd-app
  labels:
    app: truecd-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: truecd-app
  template:
    metadata:
      labels:
        app: truecd-app
    spec:
      containers:
      - name: truecd-app
        image: truecd-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: truecd-service
spec:
  selector:
    app: truecd-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer